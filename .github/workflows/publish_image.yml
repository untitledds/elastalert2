name: publish_image

on:
  push:
    # Publish `master` as Docker `latest` image.
    branches:
      - master

    tags:
      - 2.*

env:
  IMAGE_NAME: elastalert2
  DOCKER_REPO: untitledds/elastalert2

jobs:
  push:
    if: github.repository_owner == 'untitledds'
    
    environment: Main
    
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image to GitHub Container Registry
        run: |
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Use Docker `latest` tag convention
          [ "$VERSION" == "master" ] && VERSION=latest

          TAG2=""
          if [[ "$VERSION" == "2."* ]]; then
            TAG2="--tag ghcr.io/${{ github.repository }}/$IMAGE_NAME:2"
          fi

          echo VERSION=$VERSION
          echo TAG2=$TAG2

          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker buildx build \
          --platform=linux/amd64,linux/arm64 \
          --output "type=image,push=true" \
          --file ./Dockerfile . \
          --tag ghcr.io/${{ github.repository }}/$IMAGE_NAME:$VERSION $TAG2
